nav a{color:#fff;margin:0 12px;text-decoration:none;font-weight:500;}
nav a:hover{color:#e0a80d;}
section{padding:60px 40px;display:flex;justify-content:center;}
.form{background:#fff;padding:30px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.1);width:100%;max-width:500px;}
.form input,.form textarea,.form button{width:100%;padding:12px;margin:10px 0;border-radius:5px;border:1px solid #ccc;}
.form button{background:#0d1b2a;color:#fff;font-weight:600;cursor:pointer;}
footer{background:#0d1b2a;color:#fff;text-align:center;padding:20px;margin-top:40px;}

<header>

<nav>

<input type="text" placeholder="Nombre completo" required>
<input type="email" placeholder="Correo electrónico" required>
<input type="tel" placeholder="Teléfono" required>

<button type="submit">Enviar Solicitud</button>
